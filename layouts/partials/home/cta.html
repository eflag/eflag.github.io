<section class="eks-cta">
  <div class="page eks-cta-inner">
    <div class="eks-cta-text">
      <h2 class="eks-cta-h">Pronto para começar pelo diagnóstico?</h2>
      <p class="eks-cta-sub">15 minutos com um especialista. Sem pré-venda, sem deck genérico. A gente entende o ciclo e propõe o primeiro passo.</p>
    </div>
    <div class="eks-cta-actions">
      <a href="mailto:{{ .Site.Params.email }}" class="ef-btn ef-btn-primary ef-btn-lg">Agendar conversa</a>
      <span class="ef-btn ef-btn-ghost ef-btn-lg" aria-disabled="true" style="pointer-events:none;cursor:default">{{ .Site.Params.email }}</span>
    </div>
  </div>
</section>
