{{ $d := index hugo.Data site.Language.Lang }}
<section class="eks-section" id="mercado">
  <div class="page">
    <div class="eks-section-head">
      <span class="eks-section-kicker">{{ i18n "metrics_kicker" }}</span>
    </div>
    <h2 class="eks-section-title">{{ i18n "metrics_title" }}</h2>
    <p class="eks-section-sub">{{ i18n "metrics_sub" }}</p>
    <div class="eks-metrics-grid" style="margin-top:40px">
      {{ range $d.metrics }}
        <div class="eks-metric">
          <div class="eks-metric-val">{{ .v }}<sup>{{ .sup }}</sup></div>
          <div class="eks-metric-label">{{ .label }}</div>
          <div class="eks-metric-source">{{ .source }}</div>
        </div>
      {{ end }}
    </div>
  </div>
</section>
