{{ $d := index hugo.Data site.Language.Lang }}
<section class="eks-section" id="emergente">
  <div class="page">
    <div class="eks-section-head">
      <span class="eks-section-kicker">{{ i18n "emerging_kicker" }}</span>
    </div>
    <h2 class="eks-section-title">{{ i18n "emerging_title" }}</h2>
    <p class="eks-section-sub">{{ i18n "emerging_sub" }}</p>
    <div class="eks-emerge">
      {{ range $d.emerging }}
        <div class="eks-emerge-cell">
          <span class="eks-emerge-tag">{{ .tag }}</span>
          <h3>{{ .title }}</h3>
          <p>{{ .body }}</p>
          <ul class="eks-emerge-list">
            {{ range .list }}<li>{{ . }}</li>{{ end }}
          </ul>
        </div>
      {{ end }}
    </div>
  </div>
</section>
