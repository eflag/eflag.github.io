<section class="eks-section" id="problema">
  <div class="page">
    <div class="eks-section-head">
      <span class="eks-section-kicker">O que resolvemos</span>
    </div>
    <h2 class="eks-section-title">Três problemas simultâneos. Uma resposta.</h2>
    <p class="eks-section-sub">A camada de aplicação é hoje o maior vetor de ataque. E quem precisa proteger esse vetor enfrenta três limitações ao mesmo tempo.</p>
    <div class="eks-problem-grid">
      {{ range hugo.Data.problems }}
        <div class="eks-problem-cell">
          <div class="eks-problem-idx">{{ .idx }}</div>
          <h3 class="eks-problem-title">{{ .title }}</h3>
          <p class="eks-problem-body">{{ .body }}</p>
        </div>
      {{ end }}
    </div>
  </div>
</section>
