{{ $d := index hugo.Data site.Language.Lang }}
<section class="eks-section" id="problema">
  <div class="page">
    <div class="eks-section-head">
      <span class="eks-section-kicker">{{ i18n "problem_kicker" }}</span>
    </div>
    <h2 class="eks-section-title">{{ i18n "problem_title" }}</h2>
    <p class="eks-section-sub">{{ i18n "problem_sub" }}</p>
    <div class="eks-problem-grid">
      {{ range $d.problems }}
        <div class="eks-problem-cell">
          <div class="eks-problem-idx">{{ .idx }}</div>
          <h3 class="eks-problem-title">{{ .title }}</h3>
          <p class="eks-problem-body">{{ .body }}</p>
        </div>
      {{ end }}
    </div>
  </div>
</section>
