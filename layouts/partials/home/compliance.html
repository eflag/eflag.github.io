{{ $d := index hugo.Data site.Language.Lang }}
<section class="eks-dark">
  <div class="page">
    <div class="eks-section-head">
      <span class="eks-section-kicker">{{ i18n "compl_kicker" }}</span>
    </div>
    <h2 class="eks-section-title">{{ i18n "compl_title" }}</h2>
    <p class="eks-section-sub">{{ i18n "compl_sub" }}</p>
    <div class="eks-compl-table">
      {{ range $d.compliance }}
        <div class="eks-compl-row">
          <div class="eks-compl-norm">{{ .norm }}</div>
          <div class="eks-compl-req">{{ .req }}</div>
          <div class="eks-compl-deadline{{ if .urgent }} urgent{{ end }}">{{ .deadline }}</div>
        </div>
      {{ end }}
    </div>
    <p class="eks-compl-foot">{{ i18n "compl_foot" }} <a href="#servicos">{{ i18n "compl_foot_link" }}</a></p>
  </div>
</section>
