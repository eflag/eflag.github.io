<header class="eks-nav">
  <div class="page eks-nav-inner">
    <a href="{{ site.Home.RelPermalink }}" class="eks-brand"><img src="/assets/flag-color.png" width="22" height="22" alt="eflag" style="display:block"> eflag</a>
    <nav class="eks-nav-links">
      {{ $current := .RelPermalink }}
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="eks-nav-link{{ if hasPrefix $current .URL }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <div class="eks-nav-right">
      {{/* Alterna para a tradução da página atual; cai na home do outro idioma se não houver. */}}
      {{ range .Translations }}
        <a href="{{ .RelPermalink }}" class="eks-nav-lang" lang="{{ .Language.LanguageCode }}">{{ .Language.Lang | upper }}</a>
      {{ end }}
      <a href="mailto:{{ .Site.Params.email }}" class="ef-btn ef-btn-primary ef-btn-sm">{{ i18n "nav_talk" }}</a>
    </div>
  </div>
</header>
