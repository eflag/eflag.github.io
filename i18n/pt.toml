# Página sobre
[sobre_eyebrow]
other = "Sobre a eFlag"
[sobre_h1]
other = "Engenheiros que viveram o ciclo de desenvolvimento e sabem como protegê-lo."
[sobre_sub]
other = "Não somos consultores que aprenderam segurança. Somos um time de AppSec engineers com experiência real em desenvolvimento de software em empresas de alto impacto: fintechs, meios de comunicação, plataformas digitais."
[sobre_manifesto_kicker]
other = "Manifesto"
[sobre_manifesto_title]
other = "Segurança de aplicações não é etapa do desenvolvimento."
[sobre_manifesto_p1]
other = "É uma disciplina que precisa viver dentro dos times, nos processos e nas ferramentas do dia a dia. Quando segurança chega só no reteste, o que sobra é dívida. E a dívida de segurança vence em forma de incidente público."
[sobre_manifesto_p2]
other = "A eFlag nasceu de uma convicção: para resolver AppSec de verdade, é preciso entender o fluxo de engenharia por dentro. Por isso o modelo é consultoria + pesquisa + produto. E por isso a inteligência circula entre as três pernas o tempo todo."
[sobre_manifesto_p3]
other = "O que volta para o cliente é metodologia, não segredo. O que descobrimos no campo, publicamos."
[sobre_principles_kicker]
other = "Princípios de trabalho"
[sobre_principles_title]
other = "Como pensamos AppSec na prática."
[sobre_principles_sub]
other = "Seis princípios que orientam todo engajamento, do diagnóstico de uma semana ao programa de dois anos."
