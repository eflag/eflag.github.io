# English translation of data/pt/produtos.yaml. Keep both files in sync.
- slug: "review"
  tint: "cyan"
  name: "eflag Review"
  tagline: "Automated AppSec review inside the PR."
  blurb: "A tool for GitHub pipelines. It combines curated open source scanners with language models to cut noise, contextualize findings and generate actionable comments on the PR. The dev sees the problem, understands why it matters and gets the fix path before it ships to production."
  features:
    - "Native GitHub Actions integration"
    - "Customizable rules per organization and repository"
    - "Curated open source scanners (SAST, SCA, secrets)"
    - "AI contextualizes findings, suggests patches and cuts false positives"
    - "Actionable PR comment with severity and suggested fix"
    - "Categorization by real exploitability, not just CVSS"
    - "Educational mode · explains the flaw, points to the fix"
- slug: "supply-chain-guard"
  tint: "magenta"
  name: "eflag Supply Chain Guard"
  tagline: "Silent blocking of malicious packages on the dev machine."
  blurb: "A transparent package manager wrapper. It installs with a single command and silently intercepts every package installation (npm, pip, yarn, pnpm), blocking malware, typosquats and suspicious packages before they reach the dev machine or CI/CD. Beyond blocking, it monitors AI tool usage in the development environment, giving visibility into shadow AI across teams."
  features:
    - "1-command install, transparent afterwards"
    - "Multi-ecosystem support · npm, pip, yarn, pnpm"
    - "Malware blocked before download"
    - "Typosquatting detection by similarity"
    - "Heuristic analysis of suspicious packages"
    - "Copilot and LLM usage monitoring"
    - "Shadow AI dashboard per team"
