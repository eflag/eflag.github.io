# English translation of data/pt/principles.yaml. Keep both files in sync.
- icon: "ti-code"
  title: "Engineering first."
  body: "We speak the dev's language because we come from dev. Code review with security in mind, not a slide deck with a memorized framework."
- icon: "ti-target"
  title: "Real risk, not compliance theater."
  body: "We prioritize by what matters to the business. A CVSS 9 that isn't exploitable ranks below a CVSS 6 that is. Findings without context don't become tickets."
- icon: "ti-share"
  title: "Responsible disclosure."
  body: "Field research becomes public CVEs. We coordinate with maintainers and give users time to update before publishing details."
- icon: "ti-refresh"
  title: "The loop is the company."
  body: "Services feed research. Research becomes product. Product makes services sharper. It's a cycle, not a straight line."
- icon: "ti-bolt"
  title: "Speed is not the enemy."
  body: "Projects that run at the client's release pace without blocking the pipeline of those who ship. We come in before the code, not after."
- icon: "ti-shield-check"
  title: "Signal over noise."
  body: "A security pipeline that fires 14,000 alerts is a pipeline nobody reads. We configure it to fire 40, and get the team to act on all 40."
