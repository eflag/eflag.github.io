# English translation of data/pt/services.yaml. Keep both files in sync.
- key: "diagnostico"
  label: "Diagnosis"
  intro: "Every assessment delivers an executive report, a maturity score and a living roadmap your team updates and watches evolve."
  addon:
    tag: "Add-on"
    title: "Regulated institutions"
    body: "Optional add-on for any assessment, for teams that answer to regulators: we map findings to Bacen (CMN 5.274 / BCB 538), ISO 27001 and PCI DSS 4.0. The technical roadmap doubles as your regulatory compliance plan."
  cards:
    - idx: "01"
      title: "AppSec Maturity Assessment"
      body: "The maturity of your AppSec program measured with OWASP SAMM. Score per practice, gaps against the target level and a living roadmap with quick wins and structural priorities."
      tint: "cyan"
      wide: true
    - idx: "02"
      title: "AI Security Maturity Assessment"
      body: "How ready your team is to build with AI. Security maturity across LLM flows, agents and copilots, with an OWASP framework and a dedicated roadmap."
      tint: "magenta"
    - idx: "03"
      title: "Threat Modeling"
      body: "Hands-on workshops with product and engineering to map threats by scenario, including LLM flows, and turn real business risk into a prioritized backlog."
      tint: ""
    - idx: "04"
      title: "Software Supply Chain Assessment"
      body: "The risk of dependencies and build provenance in your critical projects. SCA with exploitability context, CycloneDX SBOM and a remediation roadmap."
      tint: "cyan"
      link: "/produtos/#produto-supply-chain-guard"
      link_label: "Related product: eflag Supply Chain Guard →"
    - idx: "05"
      title: "Pipeline & Platform Assessment"
      body: "An X-ray of GitHub, GitLab or your git platform, and of CI/CD pipelines: branch protection, automations, secrets and security gates. A hardening roadmap focused on signal, not noise."
      tint: "green"
      link: "/produtos/#produto-review"
      link_label: "Related product: eflag Review →"
- key: "implementacao"
  label: "Implementation"
  intro: "Traditional consulting hands over the report and leaves. We stay to build."
  cards:
    - idx: "06"
      title: "AppSec Engineering"
      body: "Our engineers join your flow to execute the roadmap: SAST, SCA and secret scanning gates in CI/CD, vulnerability fixes, repository hardening, SBOM automation, AI guardrails. Technical execution, not spreadsheet tracking."
      tint: "cyan"
- key: "validacao"
  label: "Validation"
  intro: "After building, we prove it withstands attack."
  cards:
    - idx: "07"
      title: "Expert Pentest · Web · API · LLM"
      body: "Pentesting by people who also build software. Business logic, authentication, authorization, exploit chains and attacks on LLM applications. It satisfies the auditor's requirement, but it was designed to find what scanners miss."
      tint: "magenta"
    - idx: "08"
      title: "Secure Code Review"
      body: "Manual review of critical code by engineers who write code: authentication, authorization, cryptography, integrations and AI-generated code. Where SAST can't reach."
      tint: ""
- key: "capacitacao"
  label: "Training"
  cards:
    - idx: "09"
      title: "Developer Training"
      body: "Hands-on training in what we specialize in: secure coding in your stack, OWASP Top 10, API security, supply chain and development with LLMs and copilots. With code, not generic slides."
      tint: "green"
