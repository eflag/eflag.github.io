- idx: "PROBLEMA · 01"
  title: "Time não encontra profissional."
  body: "AppSec exige domínio simultâneo de segurança e desenvolvimento. É um perfil raro, disputado e caro. Contratar internamente leva 9 a 14 meses."
- idx: "PROBLEMA · 02"
  title: "Ferramentas geram backlog sem contexto."
  body: "SAST, DAST e SCA acumulam achados sem priorização de negócio. Alerta demais, ação de menos. O time de dev ignora o que importa."
- idx: "PROBLEMA · 03"
  title: "Segurança não acompanha o ritmo."
  body: "O time de dev entrega rápido. Segurança chega no reteste, ou não chega. O resultado é dívida técnica de risco acumulando entre sprints."
