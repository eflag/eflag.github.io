- slug: "review"
  tint: "cyan"
  name: "eflag Review"
  tagline: "AppSec review automatizado dentro do PR."
  blurb: "Ferramenta para pipelines do GitHub. Combina scanners open source curados com modelos de linguagem para reduzir ruído, contextualizar achados e gerar comentários acionáveis no PR. O dev vê o problema, entende o porquê e tem o caminho de correção antes de subir pra produção."
  features:
    - "Integração nativa com GitHub Actions"
    - "Regras customizáveis por organização e repositório"
    - "Scanners open source curados (SAST, SCA, secrets)"
    - "IA contextualiza achados, sugere patches e reduz falsos positivos"
    - "Comentário acionável no PR com severidade e fix sugerido"
    - "Categorização por exploitabilidade real, não só CVSS"
    - "Modo educativo · explica a falha, aponta o caminho"
- slug: "supply-chain-guard"
  tint: "magenta"
  name: "eflag Supply Chain Guard"
  tagline: "Bloqueio silencioso de pacote malicioso na máquina do dev."
  blurb: "Wrapper transparente de package managers. Instala com um único comando e passa a interceptar silenciosamente toda instalação de pacote (npm, pip, yarn, pnpm), bloqueando malware, typosquats e pacotes suspeitos antes que cheguem na máquina do dev ou no CI/CD. Além do bloqueio, monitora o uso de ferramentas de IA no ambiente de desenvolvimento, dando visibilidade sobre shadow AI nos times."
  features:
    - "Instalação em 1 comando, transparente depois"
    - "Suporte multi-ecosystem · npm, pip, yarn, pnpm"
    - "Bloqueio de malware antes do download"
    - "Detecção de typosquatting por similaridade"
    - "Análise heurística de pacotes suspeitos"
    - "Monitoramento de uso de copilots e LLMs"
    - "Dashboard de shadow AI por equipe"
