- icon: "ti-code"
  title: "Engenharia primeiro."
  body: "Falamos a linguagem do dev porque viemos do dev. Code review com segurança em mente, não slide com framework decorado."
- icon: "ti-target"
  title: "Risco real, não compliance teatral."
  body: "Priorizamos pelo que importa pra o negócio. CVSS 9 que não é explorável fica embaixo de CVSS 6 que é. Achado sem contexto não vira ticket."
- icon: "ti-share"
  title: "Disclosure responsável."
  body: "Pesquisa de campo vira CVE pública. Coordenamos com mantenedores e damos tempo para usuários se atualizarem antes de publicar detalhes."
- icon: "ti-refresh"
  title: "O loop é a empresa."
  body: "Serviços alimentam pesquisa. Pesquisa vira produto. Produto torna serviço mais preciso. É um ciclo, não uma linha reta."
- icon: "ti-bolt"
  title: "Velocidade não é inimiga."
  body: "Projetos que operam no ritmo de release do cliente, sem travar a esteira de quem desenvolve. Entramos antes do código, não depois."
- icon: "ti-shield-check"
  title: "Sinal sobre ruído."
  body: "Pipeline de segurança que gera 14.000 alertas é pipeline que ninguém olha. Configuramos para gerar 40, e fazer o time agir nos 40."
