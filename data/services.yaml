- idx: "01"
  title: "S-SDLC Assessment"
  body: "Diagnóstico completo do ciclo de desenvolvimento. Mapa de maturidade e roadmap com quick wins e prioridades de longo prazo."
  tint: "cyan"
- idx: "02"
  title: "Threat Modeling"
  body: "Workshops práticos com times de produto e engenharia para mapear ameaças por cenário e priorizar riscos reais de negócio."
  tint: ""
- idx: "03"
  title: "Pentest de Aplicação"
  body: "Web, API e mobile com foco em lógica de negócio, autenticação, autorização e cadeias de exploração, não apenas scanners."
  tint: "magenta"
- idx: "04"
  title: "Treinamento de devs"
  body: "Capacitação prática em secure coding, OWASP Top 10 e desenvolvimento seguro integrado ao dia a dia do time."
  tint: ""
- idx: "05"
  title: "Pipeline de Segurança"
  body: "Implementação ou melhoria de SAST, DAST, SCA, secret scanning e gates de CI/CD com foco em sinal, não em ruído."
  tint: "green"
- idx: "06"
  title: "AppSec Recorrente"
  body: "Presença contínua nos rituais de desenvolvimento. Plannings, refinements, reviews e gestão de backlog de segurança."
  tint: ""
- idx: "07"
  title: "Supply Chain"
  body: "Auditoria de dependências, build provenance e SBOM. Visibilidade e controle sobre o que entra no seu pipeline."
  tint: "cyan"
- idx: "08"
  title: "Segurança com IA"
  body: "Proteção de aplicações que usam LLM e copilots. Prompt injection, vazamento de dados, manipulação de agentes."
  tint: "magenta"
