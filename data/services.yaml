# Portfólio em 4 blocos com narrativa de ciclo:
# Diagnóstico → Implementação → Validação → Capacitação.
# `wide: true` destaca o card (span 2 colunas no grid de 3).
# `link`/`link_label` apontam o serviço para o produto relacionado.
# `addon` vira um card escuro de largura total no fim do grid do bloco.
- key: "diagnostico"
  label: "Diagnóstico"
  intro: "Todo assessment entrega relatório executivo, score de maturidade e um roadmap vivo que seu time atualiza e acompanha evoluir."
  addon:
    tag: "Add-on"
    title: "Instituições reguladas"
    body: "Serviço adicional contratável em qualquer assessment, para quem precisa responder ao regulador: mapeamos os achados para Bacen (CMN 5.274 / BCB 538), ISO 27001 e PCI DSS 4.0. O roadmap técnico vira também o plano de adequação regulatória."
  cards:
    - idx: "01"
      title: "AppSec Maturity Assessment"
      body: "Maturidade do seu programa de AppSec medida com OWASP SAMM. Score por prática, gaps contra o nível-alvo e roadmap vivo com quick wins e prioridades estruturais."
      tint: "cyan"
      wide: true
    - idx: "02"
      title: "AI Security Maturity Assessment"
      body: "O quão pronto seu time está para construir com IA. Maturidade de segurança em fluxos com LLM, agentes e copilots, com framework OWASP e roadmap dedicado."
      tint: "magenta"
    - idx: "03"
      title: "Threat Modeling"
      body: "Workshops práticos com produto e engenharia para mapear ameaças por cenário, incluindo fluxos com LLM, e transformar risco real de negócio em backlog priorizado."
      tint: ""
    - idx: "04"
      title: "Software Supply Chain Assessment"
      body: "Risco das dependências e da proveniência de build dos seus projetos críticos. SCA com contexto de explorabilidade, SBOM CycloneDX e roadmap de remediação."
      tint: "cyan"
      link: "/produtos/#produto-supply-chain-guard"
      link_label: "Produto relacionado: eflag Supply Chain Guard →"
    - idx: "05"
      title: "Pipeline & Platform Assessment"
      body: "Raio-X do GitHub, GitLab ou da sua plataforma de git, e das pipelines de CI/CD: branch protection, automações, segredos e gates de segurança. Roadmap de hardening com foco em sinal, não em ruído."
      tint: "green"
      link: "/produtos/#produto-review"
      link_label: "Produto relacionado: eflag Review →"
- key: "implementacao"
  label: "Implementação"
  intro: "Consultoria tradicional entrega o relatório e vai embora. A gente fica para construir."
  cards:
    - idx: "06"
      title: "AppSec Engineering"
      body: "Nossos engenheiros entram no seu fluxo para executar o roadmap: gates de SAST, SCA e secret scanning no CI/CD, correção de vulnerabilidades, hardening de repositórios, automação de SBOM, guardrails de IA. Execução técnica, não acompanhamento de planilha."
      tint: "cyan"
- key: "validacao"
  label: "Validação"
  intro: "Depois de construir, provamos que aguenta ataque."
  cards:
    - idx: "07"
      title: "Pentest Especialista · Web · API · LLM"
      body: "Pentest de quem também desenvolve. Lógica de negócio, autenticação, autorização, cadeias de exploração e ataques a aplicações com LLM. Atende o requisito do auditor, mas foi desenhado para encontrar o que scanner não encontra."
      tint: "magenta"
    - idx: "08"
      title: "Secure Code Review"
      body: "Revisão manual de código crítico por engenheiros que programam: autenticação, autorização, criptografia, integrações e código gerado por IA. Onde SAST não chega."
      tint: ""
- key: "capacitacao"
  label: "Capacitação"
  cards:
    - idx: "09"
      title: "Treinamento de Devs"
      body: "Capacitação prática no que somos especialistas: secure coding no seu stack, OWASP Top 10, segurança de APIs, supply chain e desenvolvimento com LLMs e copilots. Hands-on, com código, não slides genéricos."
      tint: "green"
